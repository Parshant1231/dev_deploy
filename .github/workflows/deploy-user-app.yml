name: Deploy User Application

# ─────────────────────────────────────────────
# This workflow is triggered manually by the
# DevDeploy orchestrator (Phase 6).
# It receives deployment parameters as inputs.
# ─────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: 'DevDeploy deployment ID'
        required: true
        type: string
      project_id:
        description: 'DevDeploy project ID'
        required: true
        type: string
      repo_full_name:
        description: 'GitHub repository (owner/repo)'
        required: true
        type: string
      commit_sha:
        description: 'Git commit SHA to deploy'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production
      framework:
        description: 'Application framework'
        required: true
        default: 'nodejs'
        type: choice
        options:
          - nodejs
          - react
          - nextjs
          - static
      port:
        description: 'Application port'
        required: true
        default: '3000'
        type: string
      build_command:
        description: 'Build command'
        required: false
        default: 'npm run build'
        type: string
      start_command:
        description: 'Start command'
        required: false
        default: 'node index.js'
        type: string
      api_url:
        description: 'DevDeploy API URL for status updates'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devdeploy-dev-user-apps
  ECS_CLUSTER: devdeploy-dev-cluster

jobs:
  deploy:
    name: Build and Deploy ${{ inputs.repo_full_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DevDeploy (for Dockerfiles and scripts)
        uses: actions/checkout@v4

      # Check out the USER'S repository at the specific commit
      - name: Checkout user repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo_full_name }}
          ref: ${{ inputs.commit_sha }}
          path: user-app
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ─────────────────────────────────────────
      # UPDATE STATUS: BUILDING
      # ─────────────────────────────────────────
      - name: Update deployment status — BUILDING
        run: |
          curl -s -X PATCH \
            "${{ inputs.api_url }}/api/v1/projects/${{ inputs.project_id }}/deployments/${{ inputs.deployment_id }}/status" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: ${{ secrets.DEVDEPLOY_INTERNAL_KEY }}" \
            -d '{"status":"BUILDING","data":{"buildStartedAt":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}}'

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ─────────────────────────────────────────
      # BUILD THE USER'S APPLICATION
      # Uses the user's Dockerfile if it exists.
      # Falls back to a generated Dockerfile based on framework.
      # ─────────────────────────────────────────
      - name: Select or generate Dockerfile
        id: dockerfile
        run: |
          if [ -f "user-app/Dockerfile" ]; then
            echo "Using user-provided Dockerfile"
            echo "dockerfile=user-app/Dockerfile" >> $GITHUB_OUTPUT
            echo "context=user-app" >> $GITHUB_OUTPUT
          else
            echo "Generating Dockerfile for framework: ${{ inputs.framework }}"
            FRAMEWORK="${{ inputs.framework }}"
            PORT="${{ inputs.port }}"
            BUILD_CMD="${{ inputs.build_command }}"
            START_CMD="${{ inputs.start_command }}"

            # Generate framework-appropriate Dockerfile
            case $FRAMEWORK in
              nodejs)
                cat > generated.Dockerfile << EOF
          FROM node:18-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci --only=production
          COPY . .
          EXPOSE $PORT
          HEALTHCHECK --interval=30s --timeout=5s --retries=3 CMD wget -qO- http://localhost:$PORT/health || exit 1
          CMD $START_CMD
          EOF
                ;;
              react|static)
                cat > generated.Dockerfile << EOF
          FROM node:18-alpine AS builder
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci
          COPY . .
          RUN $BUILD_CMD
          FROM nginx:alpine
          COPY --from=builder /app/build /usr/share/nginx/html
          COPY --from=builder /app/dist /usr/share/nginx/html 2>/dev/null || true
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF
                ;;
              nextjs)
                cat > generated.Dockerfile << EOF
          FROM node:18-alpine AS builder
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci
          COPY . .
          ENV NEXT_TELEMETRY_DISABLED 1
          RUN $BUILD_CMD
          FROM node:18-alpine AS runner
          WORKDIR /app
          ENV NODE_ENV production
          COPY --from=builder /app/.next/standalone ./
          COPY --from=builder /app/.next/static ./.next/static
          EXPOSE $PORT
          CMD ["node", "server.js"]
          EOF
                ;;
            esac

            echo "dockerfile=generated.Dockerfile" >> $GITHUB_OUTPUT
            echo "context=user-app" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ inputs.project_id }}-${{ inputs.commit_sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          docker build \
            --platform linux/amd64 \
            --tag $IMAGE_URI \
            --build-arg PORT=${{ inputs.port }} \
            --build-arg COMMIT_SHA=${{ inputs.commit_sha }} \
            -f ${{ steps.dockerfile.outputs.dockerfile }} \
            ${{ steps.dockerfile.outputs.context }}

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      # ─────────────────────────────────────────
      # UPDATE STATUS: PUSHING_IMAGE
      # ─────────────────────────────────────────
      - name: Update deployment status — PUSHING_IMAGE
        if: success()
        run: |
          curl -s -X PATCH \
            "${{ inputs.api_url }}/api/v1/projects/${{ inputs.project_id }}/deployments/${{ inputs.deployment_id }}/status" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: ${{ secrets.DEVDEPLOY_INTERNAL_KEY }}" \
            -d '{"status":"PUSHING_IMAGE"}'

      - name: Push image to ECR
        if: success()
        run: |
          docker push ${{ env.IMAGE_URI }}
          docker tag ${{ env.IMAGE_URI }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ inputs.project_id }}-latest

          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ inputs.project_id }}-latest

      # ─────────────────────────────────────────
      # UPDATE STATUS: DEPLOYING
      # ─────────────────────────────────────────
      - name: Update deployment status — DEPLOYING
        if: success()
        run: |
          curl -s -X PATCH \
            "${{ inputs.api_url }}/api/v1/projects/${{ inputs.project_id }}/deployments/${{ inputs.deployment_id }}/status" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: ${{ secrets.DEVDEPLOY_INTERNAL_KEY }}" \
            -d "{\"status\":\"DEPLOYING\",\"data\":{\"imageUri\":\"${{ env.IMAGE_URI }}\",\"deployStartedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}}"

      # ─────────────────────────────────────────
      # DEPLOY TO ECS
      # Creates or updates an ECS service for this
      # project + environment combination.
      # ─────────────────────────────────────────
      - name: Register ECS task definition
        id: register-task
        run: |
          TASK_FAMILY="devdeploy-user-${{ inputs.project_id }}-${{ inputs.environment }}"
          LOG_GROUP="/devdeploy/dev/user-apps"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          TASK_DEF=$(cat << EOF
          {
            "family": "$TASK_FAMILY",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256",
            "memory": "512",
            "executionRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/devdeploy-dev-ecs-execution-role",
            "taskRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/devdeploy-dev-ecs-task-role",
            "containerDefinitions": [
              {
                "name": "app",
                "image": "${{ env.IMAGE_URI }}",
                "essential": true,
                "portMappings": [
                  {
                    "containerPort": ${{ inputs.port }},
                    "protocol": "tcp"
                  }
                ],
                "environment": [
                  { "name": "PORT", "value": "${{ inputs.port }}" },
                  { "name": "NODE_ENV", "value": "${{ inputs.environment }}" },
                  { "name": "COMMIT_SHA", "value": "${{ inputs.commit_sha }}" },
                  { "name": "DEPLOYED_AT", "value": "$(date -u +%Y-%m-%dT%H:%M:%SZ)" }
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "$LOG_GROUP",
                    "awslogs-region": "${{ env.AWS_REGION }}",
                    "awslogs-stream-prefix": "${{ inputs.project_id }}"
                  }
                },
                "healthCheck": {
                  "command": [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:${{ inputs.port }}/health || exit 1"
                  ],
                  "interval": 30,
                  "timeout": 5,
                  "retries": 3,
                  "startPeriod": 60
                }
              }
            ]
          }
          EOF
          )

          TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "task_family=$TASK_FAMILY" >> $GITHUB_OUTPUT

      - name: Create or update ECS service
        id: deploy-service
        run: |
          SERVICE_NAME="devdeploy-${{ inputs.project_id }}-${{ inputs.environment }}"
          VPC_CONFIG_FILE="infrastructure/terraform/environments/dev/vpc_config.json"

          # Get VPC configuration from AWS
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=devdeploy-dev-private-subnet-*" \
            --query 'Subnets[*].SubnetId' \
            --output text | tr '\t' ',')

          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=devdeploy-dev-ecs-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)

          # Check if service already exists
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services $SERVICE_NAME \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "NONE")

          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            echo "Updating existing ECS service: $SERVICE_NAME"
            aws ecs update-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service $SERVICE_NAME \
              --task-definition ${{ steps.register-task.outputs.task_arn }} \
              --desired-count 1
          else
            echo "Creating new ECS service: $SERVICE_NAME"
            # Get ALB target group (or create one — simplified for Phase 4)
            aws ecs create-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service-name $SERVICE_NAME \
              --task-definition ${{ steps.register-task.outputs.task_arn }} \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_IDS],securityGroups=[$SG_ID],assignPublicIp=DISABLED}"
          fi

          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT

      # Wait for ECS to confirm the service is stable
      - name: Wait for ECS service stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ steps.deploy-service.outputs.service_name }}
          echo "ECS service is stable"

      # ─────────────────────────────────────────
      # UPDATE STATUS: RUNNING
      # ─────────────────────────────────────────
      - name: Update deployment status — RUNNING
        if: success()
        run: |
          curl -s -X PATCH \
            "${{ inputs.api_url }}/api/v1/projects/${{ inputs.project_id }}/deployments/${{ inputs.deployment_id }}/status" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: ${{ secrets.DEVDEPLOY_INTERNAL_KEY }}" \
            -d "{\"status\":\"RUNNING\",\"data\":{\"ecsServiceArn\":\"${{ steps.deploy-service.outputs.service_name }}\",\"deployFinishedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}}"

      # ─────────────────────────────────────────
      # UPDATE STATUS: FAILED (if any step failed)
      # ─────────────────────────────────────────
      - name: Update deployment status — FAILED
        if: failure()
        run: |
          curl -s -X PATCH \
            "${{ inputs.api_url }}/api/v1/projects/${{ inputs.project_id }}/deployments/${{ inputs.deployment_id }}/status" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: ${{ secrets.DEVDEPLOY_INTERNAL_KEY }}" \
            -d "{\"status\":\"FAILED\",\"data\":{\"errorMessage\":\"GitHub Actions pipeline failed. Check workflow run ${{ github.run_id }} for details.\"}}"
            